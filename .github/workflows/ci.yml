name: CI - ac9_sport_api


on:
  push:
    paths:
      - "ac9_sport_api/**"
  pull_request:
    paths:
      - "ac9_sport_api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ac9_sport_api/requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          pytest -q

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f ac9_sport_api/Dockerfile -t ac9_sport_api:ci .
      - name: Show image size
        run: |
          docker images ac9_sport_api:ci --format "{{.Repository}}:{{.Tag}} {{.Size}}"

  publish:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Abort if GHCR_PAT missing
        run: |
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "GHCR_PAT not configured; skipping publish job.";
            exit 0;
          fi
      - name: Set IMAGE_TAG (lowercase owner)
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER_LOWER}/ac9_sport_api:latest" >> $GITHUB_ENV
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ac9_sport_api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
