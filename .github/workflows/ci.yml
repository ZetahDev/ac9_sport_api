name: CI - ac9_sport_api
on:
  push:
    branches:
      - main
    paths:
      - "ac9_sport_api/**"
  workflow_dispatch: {}

permissions:
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          # Disable errexit so we can inspect pytest's exit code and handle the "no tests collected" case.
          set +e
          pytest -q
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "Pytest collected no tests (exit code 5); continuing without failing the job."
          elif [ "$rc" -ne 0 ]; then
            echo "Pytest failed with exit code $rc";
            exit $rc
          fi

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t ac9_sport_api:ci .
      - name: Show image size
        run: |
          docker images ac9_sport_api:ci --format "{{.Repository}}:{{.Tag}} {{.Size}}"

  publish:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Abort if GHCR_PAT missing
        run: |
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "GHCR_PAT not configured; skipping publish job.";
            exit 0;
          fi
      - name: Set IMAGE_TAG (lowercase owner)
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER_LOWER}/ac9_sport_api:latest" >> $GITHUB_ENV
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
