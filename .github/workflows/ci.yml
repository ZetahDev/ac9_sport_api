name: CI - ac9_sport_api

on:
  push:
    paths:
      - "ac9_sport_api/**"
  pull_request:
    paths:
      - "ac9_sport_api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ac9_sport_api/requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          pytest -q || true

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f ac9_sport_api/Dockerfile -t ac9_sport_api:ci .
      - name: Show image size
        run: |
          docker images ac9_sport_api:ci --format "{{.Repository}}:{{.Tag}} {{.Size}}"
